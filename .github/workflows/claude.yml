name: Claude Code

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  claude:
    if: >-
      (github.event_name == 'issues' &&
       github.event.label.name == 'claude' &&
       github.event.sender.login == github.repository_owner) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            **IMPORTANT - WHEN WORKING ON ISSUES:**
            After implementing code changes and committing, create a pull request and include:
            - A concise summary of what was implemented
            - "Closes #${{ github.event.issue.number }}" in the PR body

            **COMMIT RULES:**
            - Do not add co-author attributions
            - Do not add generated-by attributions
            - Keep commit messages clear and professional

            **WHEN WORKING ON PR FEEDBACK:**
            Make requested changes and commit to the same PR branch.

            **WHEN FIXING CI FAILURES:**
            Fix failures and commit; CI will re-run automatically.

          track_progress: true
          claude_args: |
            --model "claude-opus-4-5"
            --max-turns 100
            --allowedTools "Bash(git:*),Bash(gh issue:*),Bash(gh pr:*),Bash(gh repo:*),Bash(npm:*),Bash(npx:*),Edit,Write,Read,Glob,Grep,LS,WebSearch,WebFetch"
