name: Issue → Agent Pipeline

# ─────────────────────────────────────────────
# TRIGGER: fires when a new issue is opened
# ─────────────────────────────────────────────
on:
  issues:
    types: [opened]

permissions:
  contents: write   # create branches
  issues: write     # label, comment, assign

jobs:
  triage-and-launch:
    name: Triage → Branch → Assign Agent
    runs-on: ubuntu-latest

    # Safety: never react to bots opening issues
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'claude[bot]'         &&
      github.actor != 'codex[bot]'          &&
      github.actor != 'dependabot[bot]'

    steps:
      # ── 1. Auto-label via Claude ────────────────────────────────────────
      - name: Auto-triage labels with Claude
        id: triage
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const issue    = context.payload.issue;
            const title    = issue.title  || '';
            const body     = issue.body   || '';

            // ── Call Claude to classify the issue ──────────────────────
            const res = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type':      'application/json',
                'x-api-key':         process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model:      'claude-sonnet-4-20250514',
                max_tokens: 300,
                messages: [{
                  role:    'user',
                  content: `You are a technical project manager triaging GitHub issues.
            Classify the issue below and return ONLY valid JSON — no markdown, no preamble.

            Schema:
            {
              "type_label":  "bug" | "feature" | "enhancement" | "documentation" | "refactor" | "chore",
              "priority":    "P0" | "P1" | "P2" | "P3",
              "complexity":  "XS" | "S" | "M" | "L" | "XL",
              "agent":       "claude" | "codex",
              "summary":     "<one sentence explaining the task for the agent>"
            }

            Rules:
            - P0 = production broken, P1 = high impact, P2 = normal, P3 = nice-to-have
            - complexity: XS=trivial fix, S<<1hr, M=half-day, L=full day, XL=multi-day
            - agent: prefer "claude" for architecture/refactors, "codex" for greenfield features

            Issue title: ${title}
            Issue body:
            ${body.slice(0, 2000)}`
                }]
              })
            });

            const data   = await res.json();
            const text   = data.content[0].text.replace(/```json|```/g, '').trim();
            const parsed = JSON.parse(text);
            core.setOutput('type_label', parsed.type_label);
            core.setOutput('priority',   parsed.priority);
            core.setOutput('complexity', parsed.complexity);
            core.setOutput('agent',      parsed.agent);
            core.setOutput('summary',    parsed.summary);
            console.log('Triage result:', JSON.stringify(parsed, null, 2));

      # ── 2. Apply labels (creates them if missing) ───────────────────────
      - name: Apply labels
        uses: actions/github-script@v7
        env:
          TYPE_LABEL: ${{ steps.triage.outputs.type_label }}
          PRIORITY:   ${{ steps.triage.outputs.priority }}
          COMPLEXITY: ${{ steps.triage.outputs.complexity }}
        with:
          script: |
            const labelDefs = [
              // [name, color, description]
              [process.env.TYPE_LABEL, '0075ca', 'Issue type'],
              [process.env.PRIORITY,   'd93f0b', 'Priority tier'],
              [process.env.COMPLEXITY, '0e8a16', 'Story-point size'],
              ['agent-assigned',       '6f42c1', 'Coding agent is working on this'],
            ];

            // Ensure every label exists in the repo
            for (const [name, color, description] of labelDefs) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name, color, description
                });
              }
            }

            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              labels:       labelDefs.map(([n]) => n)
            });

      # ── 3. Create a dedicated branch ────────────────────────────────────
      - name: Create feature branch
        id: branch
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const slug  = issue.title
              .toLowerCase()
              .replace(/[^a-z0-9\s]/g, '')
              .replace(/\s+/g, '-')
              .slice(0, 50)
              .replace(/-+$/, '');   // trim trailing dashes

            const branchName = `issue-${issue.number}/${slug}`;

            // Get default branch HEAD
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo:  context.repo.repo
            });
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `heads/${repo.default_branch}`
            });

            // Create the branch
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `refs/heads/${branchName}`,
              sha:   ref.object.sha
            });

            core.setOutput('branch_name',    branchName);
            core.setOutput('default_branch', repo.default_branch);
            console.log(`Branch created: ${branchName}`);

      # ── 4. Assign the coding agent (claude or codex) ────────────────────
      - name: Assign coding agent to issue
        uses: actions/github-script@v7
        env:
          CHOSEN_AGENT: ${{ steps.triage.outputs.agent }}
        with:
          script: |
            // GitHub Agent HQ: assigning 'claude' or 'codex' triggers their sessions
            await github.rest.issues.addAssignees({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees:    [process.env.CHOSEN_AGENT]
            });
            console.log(`Assigned to: ${process.env.CHOSEN_AGENT}`);

      # ── 5. Post a rich status comment on the issue ──────────────────────
      - name: Post pipeline status comment
        uses: actions/github-script@v7
        env:
          TYPE_LABEL:  ${{ steps.triage.outputs.type_label }}
          PRIORITY:    ${{ steps.triage.outputs.priority }}
          COMPLEXITY:  ${{ steps.triage.outputs.complexity }}
          AGENT:       ${{ steps.triage.outputs.agent }}
          SUMMARY:     ${{ steps.triage.outputs.summary }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
          DEF_BRANCH:  ${{ steps.branch.outputs.default_branch }}
        with:
          script: |
            const issue      = context.payload.issue;
            const repoUrl    = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const branchUrl  = `${repoUrl}/tree/${process.env.BRANCH_NAME}`;
            const agentIcon  = process.env.AGENT === 'claude' ? '🤖 Claude' : '⚡ Codex';

            const body = `## 🚀 Issue Pipeline Activated

            | Field | Value |
            |-------|-------|
            | **Type** | \`${process.env.TYPE_LABEL}\` |
            | **Priority** | \`${process.env.PRIORITY}\` |
            | **Complexity** | \`${process.env.COMPLEXITY}\` |
            | **Assigned Agent** | ${agentIcon} |
            | **Branch** | [\`${process.env.BRANCH_NAME}\`](${branchUrl}) |

            ### 🎯 Agent Brief
            > ${process.env.SUMMARY}

            ### ⏭ What happens next
            1. ${agentIcon} reads this issue and begins implementation on \`${process.env.BRANCH_NAME}\`
            2. Code is pushed → Vercel builds a preview deployment automatically
            3. A Vercel preview card will be posted here once deployed
            4. **You create the PR and merge when you're satisfied** — no auto-PR will be opened

            ---
            *Pipeline triggered by [@${context.actor}](https://github.com/${context.actor})*`;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issue.number,
              body:         body.replace(/^            /gm, '')   // strip indent
            });
